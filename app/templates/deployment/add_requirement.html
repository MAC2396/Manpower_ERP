{% extends 'base.html' %}
{% block page_title %}Add Manpower Requirement{% endblock %}
{% block content %}
<div class="content-card" style="max-width:700px">
    <h6 class="fw-semibold mb-4">Add Manpower Requirement</h6>
    <form method="POST">
        <div class="row g-3">
            <div class="col-md-12">
                <label class="form-label">Client Company *</label>
                <select name="company_id" class="form-select" required>
                    <option value="">-- Select Company --</option>
                    {% for c in companies %}
                    <option value="{{ c.id }}">{{ c.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Post / Designation *</label>
                <input type="text" name="post" class="form-control"
                       placeholder="e.g. Helper, Supervisor, Operator" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Required Count *</label>
                <input type="number" name="required_count" class="form-control"
                       min="1" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Month *</label>
                <select name="month" class="form-select" required>
                    {% for m in range(1,13) %}
                    <option value="{{ m }}"
                        {{ 'selected' if m == current_month }}>
                        {{ '%02d' % m }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Year *</label>
                <input type="number" name="year" class="form-control"
                       value="{{ current_year }}" required>
            </div>
            <div class="col-md-4">
                <label class="form-label">Shift</label>
                <select name="shift" class="form-select">
                    <option>General</option>
                    <option>Morning</option>
                    <option>Evening</option>
                    <option>Night</option>
                </select>
            </div>
            <div class="col-md-12">
                <label class="form-label">Notes</label>
                <textarea name="notes" class="form-control" rows="2"></textarea>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary">Save Requirement</button>
                <a href="/deployment" class="btn btn-secondary ms-2">Cancel</a>
            </div>
        </div>
    </form>
</div>
{% endblock %}
