{% extends 'base.html' %}
{% block page_title %}Edit — {{ company.name }}{% endblock %}
{% block content %}

<div class="content-card" style="max-width:700px">
    <h6 class="fw-semibold mb-4">Edit Company Details</h6>
    <form method="POST">
        <div class="row g-3">
            <div class="col-md-12">
                <label class="form-label">
                    Company Name *
                </label>
                <input type="text" name="name"
                       class="form-control"
                       value="{{ company.name }}" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">
                    Contact Person
                </label>
                <input type="text" name="contact_person"
                       class="form-control"
                       value="{{ company.contact_person or '' }}">
            </div>
            <div class="col-md-6">
                <label class="form-label">
                    Contact Phone
                </label>
                <input type="text" name="contact_phone"
                       class="form-control"
                       value="{{ company.contact_phone or '' }}">
            </div>
            <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" name="email"
                       class="form-control"
                       value="{{ company.email or '' }}">
            </div>
            <div class="col-md-6">
                <label class="form-label">GST Number</label>
                <input type="text" name="gst_number"
                       class="form-control"
                       value="{{ company.gst_number or '' }}">
            </div>
            <div class="col-md-12">
                <label class="form-label">
                    Registered Address
                </label>
                <textarea name="address"
                          class="form-control"
                          rows="2">{{ company.address or '' }}</textarea>
            </div>
            <div class="col-md-6">
                <label class="form-label">City</label>
                <input type="text" name="city"
                       class="form-control"
                       value="{{ company.city or '' }}">
            </div>
            <div class="col-md-3">
                <label class="form-label">State</label>
                <input type="text" name="state"
                       class="form-control"
                       value="{{ company.state or '' }}">
            </div>
            <div class="col-md-3">
                <label class="form-label">Pincode</label>
                <input type="text" name="pincode"
                       class="form-control"
                       value="{{ company.pincode or '' }}">
            </div>
            <div class="col-12">
                <button type="submit"
                        class="btn btn-primary">
                    <i class="bi bi-save"></i>
                    Update Company
                </button>
                <a href="/clients/{{ company.id }}"
                   class="btn btn-secondary ms-2">
                    Cancel
                </a>
            </div>
        </div>
    </form>
</div>
{% endblock %}
