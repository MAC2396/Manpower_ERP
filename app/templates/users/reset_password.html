{% extends 'base.html' %}
{% block page_title %}Reset Password{% endblock %}
{% block content %}
<div class="content-card" style="max-width:400px">
    <h6 class="fw-semibold mb-4">
        Reset Password — {{ user.full_name }}
    </h6>
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">New Password *</label>
            <input type="password" name="password"
                   class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">
            Reset Password
        </button>
        <a href="/users" class="btn btn-secondary ms-2">
            Cancel
        </a>
    </form>
</div>
{% endblock %}
