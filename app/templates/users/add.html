{% extends 'base.html' %}
{% block page_title %}Add User{% endblock %}
{% block content %}

<div class="content-card" style="max-width:650px">
    <h6 class="fw-semibold mb-4">Add New User</h6>
    <form method="POST">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Full Name *</label>
                <input type="text" name="full_name"
                       class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Username *</label>
                <input type="text" name="username"
                       class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Password *</label>
                <input type="password" name="password"
                       class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Role *</label>
                <select name="role" class="form-select"
                        id="roleSelect"
                        onchange="toggleCompany(this.value)"
                        required>
                    <option value="supervisor">Supervisor</option>
                    <option value="hr">HR</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Mobile</label>
                <input type="text" name="mobile"
                       class="form-control">
            </div>
            <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" name="email"
                       class="form-control">
            </div>

            <!-- Single Company for Supervisor -->
            <div class="col-12" id="companySection">
                <label class="form-label">
                    Assign Company
                    <small class="text-muted">
                        (one company per supervisor)
                    </small>
                </label>
                <select name="company_id" class="form-select">
                    <option value="">
                        -- Select Company --
                    </option>
                    {% for c in companies %}
                    <option value="{{ c.id }}">
                        {{ c.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-12">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-person-plus"></i>
                    Create User
                </button>
                <a href="/users"
                   class="btn btn-secondary ms-2">Cancel</a>
            </div>
        </div>
    </form>
</div>

{% endblock %}

{% block scripts %}
<script>
function toggleCompany(role) {
    const section = document.getElementById('companySection');
    section.style.display =
        role === 'supervisor' ? 'block' : 'none';
}
toggleCompany('supervisor');
</script>
{% endblock %}
