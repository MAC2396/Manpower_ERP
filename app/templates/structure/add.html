{% extends 'base.html' %}
{% block page_title %}Add Salary Structure{% endblock %}

{% block content %}
<div class="content-card">
    <h5 class="fw-semibold mb-3">Add Salary Structure</h5>
    
    <form method="POST">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Company *</label>
                <select name="company_id" class="form-select" required>
                    <option value="">Select Company</option>
                    {% for company in companies %}
                    <option value="{{ company.id }}">{{ company.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Structure Name *</label>
                <input type="text" name="name" class="form-control" required placeholder="e.g., Standard, Executive">
            </div>
        </div>
        
        <h6 class="fw-semibold mt-3">Salary Components (% of Gross)</h6>
        <div class="row">
            <div class="col-md-4 mb-2">
                <label class="form-label">Basic Salary (%)</label>
                <input type="number" name="basic_percent" class="form-control" value="40" step="0.5">
            </div>
            <div class="col-md-4 mb-2">
                <label class="form-label">DA (Dearness Allowance) (%)</label>
                <input type="number" name="da_percent" class="form-control" value="10" step="0.5">
            </div>
            <div class="col-md-4 mb-2">
                <label class="form-label">HRA (%)</label>
                <input type="number" name="hra_percent" class="form-control" value="15" step="0.5">
            </div>
            <div class="col-md-4 mb-2">
                <label class="form-label">Conveyance (%)</label>
                <input type="number" name="conveyance_percent" class="form-control" value="5" step="0.5">
            </div>
            <div class="col-md-4 mb-2">
                <label class="form-label">Medical Allowance (%)</label>
                <input type="number" name="medical_percent" class="form-control" value="5" step="0.5">
            </div>
            <div class="col-md-4 mb-2">
                <label class="form-label">Special Allowance (%)</label>
                <input type="number" name="special_allowance_percent" class="form-control" value="25" step="0.5">
            </div>
        </div>
        
        <h6 class="fw-semibold mt-3">EPF Configuration</h6>
        <div class="row">
            <div class="col-md-4 mb-2">
                <label class="form-label">Calculation Base</label>
                <select name="epf_calculation_base" class="form-select">
                    <option value="basic">Basic Only</option>
                    <option value="basic_da">Basic + DA</option>
                    <option value="basic_da_allowances">Basic + DA + All Allowances</option>
                </select>
            </div>
            <div class="col-md-3 mb-2">
                <label class="form-label">Employee Rate (%)</label>
                <input type="number" name="epf_employee_rate" class="form-control" value="12" step="0.5">
            </div>
            <div class="col-md-3 mb-2">
                <label class="form-label">Employer Rate (%)</label>
                <input type="number" name="epf_employer_rate" class="form-control" value="12" step="0.5">
            </div>
            <div class="col-md-2 mb-2">
                <label class="form-label">Max Limit (₹)</label>
                <input type="number" name="epf_max_limit" class="form-control" value="15000">
            </div>
        </div>
        
        <h6 class="fw-semibold mt-3">ESIC Configuration</h6>
        <div class="row">
            <div class="col-md-4 mb-2">
                <label class="form-label">Calculation Base</label>
                <select name="esic_calculation_base" class="form-select">
                    <option value="basic">Basic Only</option>
                    <option value="basic_da">Basic + DA</option>
                    <option value="basic_da_allowances">Basic + DA + All Allowances</option>
                </select>
            </div>
            <div class="col-md-3 mb-2">
                <label class="form-label">Employee Rate (%)</label>
                <input type="number" name="esic_employee_rate" class="form-control" value="0.75" step="0.25">
            </div>
            <div class="col-md-3 mb-2">
                <label class="form-label">Employer Rate (%)</label>
                <input type="number" name="esic_employer_rate" class="form-control" value="3.25" step="0.25">
            </div>
            <div class="col-md-2 mb-2">
                <label class="form-label">Max Limit (₹)</label>
                <input type="number" name="esic_max_limit" class="form-control" value="21000">
            </div>
        </div>
        
        <h6 class="fw-semibold mt-3">Experience-Based Increments</h6>
        <div id="increments-container">
            <div class="row mb-2 increment-row">
                <div class="col-md-4">
                    <input type="number" name="exp_years[]" class="form-control" placeholder="Years of Service">
                </div>
                <div class="col-md-4">
                    <input type="number" name="exp_increases[]" class="form-control" placeholder="Increase (%)">
                </div>
                <div class="col-md-2">
                    <button type="button" class="btn btn-danger btn-sm" onclick="removeRow(this)">Remove</button>
                </div>
            </div>
        </div>
        <button type="button" class="btn btn-secondary btn-sm mb-3" onclick="addIncrementRow()">+ Add Increment Rule</button>
        
        <div class="form-check mb-3">
            <input type="checkbox" name="professional_tax_enabled" class="form-check-input" checked>
            <label class="form-check-label">Enable Professional Tax Deduction</label>
        </div>
        
        <button type="submit" class="btn btn-primary">Save Structure</button>
        <a href="/structure" class="btn btn-secondary">Cancel</a>
    </form>
</div>

<script>
function addIncrementRow() {
    const container = document.getElementById('increments-container');
    const newRow = document.createElement('div');
    newRow.className = 'row mb-2 increment-row';
    newRow.innerHTML = `
        <div class="col-md-4">
            <input type="number" name="exp_years[]" class="form-control" placeholder="Years of Service">
        </div>
        <div class="col-md-4">
            <input type="number" name="exp_increases[]" class="form-control" placeholder="Increase (%)">
        </div>
        <div class="col-md-2">
            <button type="button" class="btn btn-danger btn-sm" onclick="removeRow(this)">Remove</button>
        </div>
    `;
    container.appendChild(newRow);
}

function removeRow(btn) {
    btn.closest('.increment-row').remove();
}
</script>
{% endblock %}
